# ============================================================
#   APPLICATION PROPERTIES - Expense Tracker API
# ============================================================

# --- Server Config ---
server.port=8080

# --- Application Name ---
spring.application.name=expense-tracker

# ============================================================
#   DATABASE CONFIGURATION (MySQL)
#   Replace username/password with your MySQL credentials
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/expense_tracker_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_password_here
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
#   JPA / HIBERNATE CONFIG
# ============================================================

# Automatically create/update database tables based on entities
# Options: create | create-drop | update | validate | none
# Use 'update' for development, 'validate' for production
spring.jpa.hibernate.ddl-auto=update

# Show SQL queries in console (helpful for debugging)
spring.jpa.show-sql=true

# Format SQL output for readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL dialect for Hibernate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ============================================================
#   JACKSON (JSON) CONFIG
# ============================================================

# Format dates as readable strings instead of timestamps
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd

# ============================================================
#   LOGGING
# ============================================================
logging.level.com.expensetracker=DEBUG
logging.level.org.hibernate.SQL=DEBUG
